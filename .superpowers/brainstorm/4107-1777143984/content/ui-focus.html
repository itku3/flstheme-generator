<h2>UI 개선 — 어느 영역이 가장 아쉬우신가요?</h2>
<p class="subtitle">클릭해서 하나 또는 여러 개를 선택하세요</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="layout" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>전체 레이아웃</h3>
      <p>2열 고정 구조, 헤더 배치, 공간 활용 방식이 어색함</p>
    </div>
  </div>

  <div class="option" data-choice="palette-ux" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>팔레트 선택 UX</h3>
      <p>프리셋 토글 버튼, 색상 입력 방식, 스와치 표현이 불편함</p>
    </div>
  </div>

  <div class="option" data-choice="preview" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>미리보기 품질</h3>
      <p>FL Studio UI 재현이 너무 단순하고 실감이 없음</p>
    </div>
  </div>

  <div class="option" data-choice="polish" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>시각적 완성도</h3>
      <p>타이포그래피, 간격, 색상 등 전체적인 분위기가 밋밋함</p>
    </div>
  </div>
</div>
